llm_style: openrouter
llm_api_key: sk-or-v1-XXX
best_llm_model: "openai/gpt-4o-mini" # OpenRouter model slug: "{provider}/{model}"
# llm_base_url defaults to https://openrouter.ai/api/v1, override if needed

# Optional: OpenRouter's recommended attribution headers (no code changes needed)
# llm_openai_default_header:
#   HTTP-Referer: "https://your-app.example.com"
#   X-Title: "Your App Name"

embedding_provider: openrouter
embedding_api_key: sk-or-v1-XXX
embedding_model: "openai/text-embedding-3-small" # known-good: supports the "dimensions" param via OpenRouter
# not all OpenRouter-routed embedding models accept "dimensions" — if you switch models and hit a 400, try another model
embedding_dim: 1536
# embedding_base_url defaults to https://openrouter.ai/api/v1, override if needed
